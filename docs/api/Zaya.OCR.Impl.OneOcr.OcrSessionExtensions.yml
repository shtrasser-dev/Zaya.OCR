  namespace: Zaya.OCR.Impl.OneOcr
  summary: >-
    Recognizes text from a <xref href="System.Drawing.Bitmap" data-throw-if-not-resolved="false"></xref> by converting it to raw BGRA pixels

    and delegating to <xref href="Zaya.OCR.Services.IOCRSession.RecognizeAsync(Zaya.Primitives.IRawImage%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static Task<IOCRResult> RecognizeAsync(this IOCRSession session, Bitmap bitmap, CancellationToken cancellationToken = default)
    parameters:
    - id: session
      type: Zaya.OCR.Services.IOCRSession
      description: The OCR session.
    - id: bitmap
      type: System.Drawing.Bitmap
      description: The bitmap to recognize text from.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Token to cancel the recognition operation.
    return:
      type: System.Threading.Tasks.Task{Zaya.OCR.Models.IOCRResult}
      description: The OCR result containing recognized words and confidence.
    content.vb: Public Shared Function RecognizeAsync(session As IOCRSession, bitmap As Bitmap, cancellationToken As CancellationToken = Nothing) As Task(Of IOCRResult)
