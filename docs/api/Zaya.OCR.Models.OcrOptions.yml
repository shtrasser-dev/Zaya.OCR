  assemblies:
  - Zaya.OCR
  namespace: Zaya.OCR.Models
  summary: >-
    Configuration options for OCR recognition operations.

    Options that are not supported by a particular engine implementation are silently ignored.

    When <xref href="Zaya.OCR.Models.OcrOptions.Width" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.OCR.Models.OcrOptions.Height" data-throw-if-not-resolved="false"></xref>, <xref href="Zaya.OCR.Models.OcrOptions.Stride" data-throw-if-not-resolved="false"></xref>, and <xref href="Zaya.OCR.Models.OcrOptions.PixelFormat" data-throw-if-not-resolved="false"></xref>

    are set, the <code>byte[]</code> passed to <xref href="Zaya.OCR.Services.IOCRSession.RecognizeAsync(System.Byte%5b%5d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>

    is treated as raw pixel data rather than an encoded image (PNG, JPEG, BMP).
