  namespace: Zaya.OCR.Impl.OneOcr.Services
  summary: >-
    OneOCR engine implementation of <xref href="Zaya.OCR.Services.IOCRService" data-throw-if-not-resolved="false"></xref> using P/Invoke

    into the native <code>oneocr.dll</code> (Windows 11 SnippingTool OCR engine).

    No WinRT, no Windows App SDK, no package identity required.

    Call <xref href="Zaya.OCR.Impl.OneOcr.Services.OneOcrService.InitializeAsync(System.Collections.Generic.IReadOnlyDictionary%7bSystem.String%2cSystem.Object%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> before creating sessions.
