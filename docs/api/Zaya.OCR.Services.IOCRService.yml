  assemblies:
  - Zaya.OCR
  namespace: Zaya.OCR.Services
  summary: >-
    Creates a new OCR session with the specified options.

    The session holds the options and can be used for multiple recognition calls.
  example: []
  syntax:
    content: Task<IOCRSession> CreateSessionAsync(OcrOptions? options = null, CancellationToken cancellationToken = default)
    parameters:
    - id: options
      type: Zaya.OCR.Models.OcrOptions
      description: Recognition options, or <code>null</code> for defaults.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Token to cancel session creation.
    return:
      type: System.Threading.Tasks.Task{Zaya.OCR.Services.IOCRSession}
      description: An active OCR session ready to recognize text.
    content.vb: Function CreateSessionAsync(options As OcrOptions = Nothing, cancellationToken As CancellationToken = Nothing) As Task(Of IOCRSession)
