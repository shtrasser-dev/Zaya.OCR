  summary: >-
    Provides text recognition (OCR) capabilities.

    Create sessions with <xref href="Zaya.OCR.Services.IOCRService.CreateSessionAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> to perform recognition

    with a fixed set of options.

    Call <xref href="Zaya.OCR.Services.IOCRService.InitializeAsync(System.Collections.Generic.IReadOnlyDictionary%7bSystem.String%2cSystem.Object%7d%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> with engine-specific settings before use.
